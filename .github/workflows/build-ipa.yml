name: Build ReDyne IPA (unsigned)

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Locate project / workspace and scheme
        id: locate
        run: |
          set -e
          PROJECT=$(find . -maxdepth 3 -name "*.xcodeproj" | head -n 1)
          WORKSPACE=$(find . -maxdepth 3 -name "*.xcworkspace" | grep -v "/project.xcworkspace" | head -n 1)
          echo "Found project: $PROJECT"
          echo "Found workspace: $WORKSPACE"

          if [ -n "$WORKSPACE" ]; then
            echo "container=-workspace \"$WORKSPACE\"" >> $GITHUB_OUTPUT
            SCHEME_LIST=$(xcodebuild -list -workspace "$WORKSPACE" -json)
          else
            echo "container=-project \"$PROJECT\"" >> $GITHUB_OUTPUT
            SCHEME_LIST=$(xcodebuild -list -project "$PROJECT" -json)
          fi

          echo "$SCHEME_LIST"
          SCHEME=$(echo "$SCHEME_LIST" | python3 -c "import json,sys; d=json.load(sys.stdin); k='workspace' if 'workspace' in d else 'project'; print(d[k]['schemes'][0])")
          echo "Using scheme: $SCHEME"
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build (unsigned, for device, no codesigning)
        run: |
          set -o pipefail
          eval xcodebuild ${{ steps.locate.outputs.container }} \
            -scheme "${{ steps.locate.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build | tee build.log | xcpretty || true
          # Fail the job if the actual build failed, regardless of xcpretty's exit code
          if grep -q "BUILD FAILED" build.log; then
            echo "Build failed, dumping full log tail:"
            tail -n 300 build.log
            exit 1
          fi

      - name: Locate .app and package as .ipa
        run: |
          set -e
          APP_PATH=$(find build -name "*.app" -path "*Release-iphoneos*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" | head -n 1)
          fi
          echo "App path: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found, build artifacts:"
            find build -maxdepth 6
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          mkdir -p out
          zip -r "out/ReDyne-unsigned.ipa" Payload
          echo "IPA contents:"
          unzip -l "out/ReDyne-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReDyne-unsigned-ipa
          path: out/ReDyne-unsigned.ipa
          retention-days: 14

      - name: Upload full build log (for debugging failures)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 14
